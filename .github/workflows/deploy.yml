name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build + Deploy to SprintHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:hosting
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check build output
        run: |
          FILE_COUNT=$(find ./public_html -name "*.html" | wc -l)
          echo "HTML файлов в сборке: $FILE_COUNT"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ОШИБКА: слишком мало файлов в сборке. Деплой отменён."
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            .gitkeep
