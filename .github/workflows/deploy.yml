name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Lint + Test + Build + Deploy to SprintHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npx eslint "src/scripts/**/*.js"

      - name: Lint CSS
        run: npx stylelint "src/styles/**/*.scss"

      - name: Generate city pages (for tests)
        run: npm run generate

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build:hosting
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check build output
        run: |
          FILE_COUNT=$(find ./public_html -name "*.html" | wc -l)
          echo "HTML файлов в сборке: $FILE_COUNT"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ОШИБКА: слишком мало файлов в сборке. Деплой отменён."
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            .gitkeep

      - name: IndexNow — уведомить Yandex и Bing
        run: |
          KEY="bde05525-af0e-48de-b161-305c96820afb"
          HOST="sk-rosa.ru"
          PAYLOAD=$(cat <<EOF
          {
            "host": "$HOST",
            "key": "$KEY",
            "keyLocation": "https://$HOST/$KEY.txt",
            "urlList": [
              "https://$HOST/",
              "https://$HOST/plastering",
              "https://$HOST/airless-painting",
              "https://$HOST/floor-screed",
              "https://$HOST/turnkey-repair",
              "https://$HOST/blog",
              "https://$HOST/sitemap.xml"
            ]
          }
          EOF
          )

          echo "Отправка в Yandex IndexNow..."
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://yandex.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD"

          echo ""
          echo "Отправка в Bing IndexNow..."
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD"

          echo ""
          echo "IndexNow завершён"

      - name: Ping Google Sitemap
        run: |
          echo "Пинг Google Sitemap..."
          curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://sk-rosa.ru/sitemap.xml"
          echo ""
          echo "Google Sitemap ping завершён"
